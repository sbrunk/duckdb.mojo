[workspace]
authors = ["Sören Brunk <soeren@brunk.io>"]
channels = ["https://prefix.dev/conda-forge", "https://conda.modular.com/max-nightly/"]
description = "DuckDB bindings for Mojo"
name = "duckdb.mojo"
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]
preview = ["pixi-build"]

[package]
name = "duckdb.mojo"
version = "0.0.1"

# see https://prefix-dev.github.io/pixi-build-backends/backends/pixi-build-mojo/
[package.host-dependencies]
mojo-compiler = "=1.0.0b2.dev2026060206"

[package.build-dependencies]
mojo-compiler = "=1.0.0b2.dev2026060206"

[package.build.backend]
name = "pixi-build-mojo"
version = "0.1.*"
channels = [
    "https://prefix.dev/pixi-build-backends",
    "https://prefix.dev/conda-forge",
]

[package.build.config.pkg]
name = "duckdb"
path = "duckdb"

[tasks]
build = "pixi run mojo precompile duckdb -o duckdb.mojoc"
test-library = { cmd = "bash scripts/run_tests.sh" }
clone-duckdb = "sh scripts/clone_duckdb.sh"
generate-api = { cmd = "python3 scripts/generate_mojo_api.py --duckdb-dir .duckdb-src --output duckdb/_libduckdb.mojo", depends-on = ["clone-duckdb"] }
# Fails if duckdb/_libduckdb.mojo is out of sync with the DuckDB version
# (regenerates first via generate-api, then checks for an unexpected diff).
check-generated-api = { cmd = "bash scripts/check_generated_api.sh", depends-on = ["generate-api"] }

# Demo extension.
# The mojo build/run calls are wrapped in `bash -c` so $MOJO_TARGET_FLAGS (set
# ONLY in CI, see .github/workflows/test.yml) is applied as a codegen target
# override on the affected runners. Unset locally → expands to nothing → native.
build-demo-extension = { cmd = "bash -c 'mkdir -p demo-extension/build && mojo build $MOJO_TARGET_FLAGS demo-extension/src/demo_mojo_extension.mojo --emit shared-lib -o demo-extension/build/demo_mojo.duckdb_extension && python3 scripts/append_extension_metadata.py demo-extension/build/demo_mojo.duckdb_extension'", depends-on = ["build"] }
test-demo-extension = { cmd = "duckdb -unsigned -c \"LOAD 'demo-extension/build/demo_mojo.duckdb_extension'; SELECT mojo_add_numbers(40, 2) AS result;\"", depends-on = ["build-demo-extension"] }

# Test extension
build-test-extension = { cmd = "bash -c 'mkdir -p test-extension/build && mojo build $MOJO_TARGET_FLAGS test-extension/src/test_mojo_extension.mojo --emit shared-lib -o test-extension/build/mojo.duckdb_extension && python3 scripts/append_extension_metadata.py test-extension/build/mojo.duckdb_extension && mojo build $MOJO_TARGET_FLAGS test-extension/src/test_bad_api_extension.mojo --emit shared-lib -o test-extension/build/bad_api.duckdb_extension && python3 scripts/append_extension_metadata.py test-extension/build/bad_api.duckdb_extension && mojo build $MOJO_TARGET_FLAGS test-extension/src/test_mojo_unstable_extension.mojo --emit shared-lib -o test-extension/build/mojo_unstable.duckdb_extension && python3 scripts/append_extension_metadata.py test-extension/build/mojo_unstable.duckdb_extension --abi-type C_STRUCT_UNSTABLE'", depends-on = ["build"] }
test-extension = { cmd = "bash -c 'mojo run $MOJO_TARGET_FLAGS test-extension/test_extension.mojo'", depends-on = ["build-test-extension"] }

test = {depends-on = ["test-library", "test-demo-extension", "test-extension"]}

# Compile-check (no run) the benchmarks so they can't silently rot when the
# stdlib or duckdb API drifts. The op-replacement benchmark needs the `full`
# environment and is excluded here (see scripts/compile_check.sh).
compile-benchmarks = { cmd = "bash scripts/compile_check.sh benchmark" }

# for local development
[dependencies]
libduckdb-devel = "=1.5.3"
duckdb-cli = "=1.5.3"
mojo = "=1.0.0b2.dev2026060206"
#mojodoc = { git = "https://github.com/ehsanmok/mojodoc.git", branch = "main" }

# Make mojo find the duckdb package from source without building a mojopkg.
# The source directory is named `duckdb/` so mojo resolves `from duckdb import ...` directly.
# MODULAR_MOJO_MAX_IMPORT_PATH overrides the default, so we include the stdlib path too.
[activation.env]
MODULAR_MOJO_MAX_IMPORT_PATH = "$PIXI_PROJECT_ROOT,$CONDA_PREFIX/lib/mojo"

# Feature: operator-replacement (requires building DuckDB from source)
[feature.operator-replacement.dependencies]
duckdb-from-source = { path = "packages/duckdb-from-source" }
duckdb-operator-replacement = { path = "packages/operator-replacement" }
mojo = "=1.0.0b2.dev2026060206"

# The `full` environment sets no-default-feature = true, so the top-level
# [activation.env] above does not apply. Re-declare the import path here so
# `mojo` finds both the `duckdb` package (project root) and the installed
# packages — stdlib + operator_replacement — under $CONDA_PREFIX/lib/mojo.
[feature.operator-replacement.activation.env]
MODULAR_MOJO_MAX_IMPORT_PATH = "$PIXI_PROJECT_ROOT,$CONDA_PREFIX/lib/mojo"

# Environments
# 
# default: Standard development environment using precompiled libduckdb from conda-forge.
#          Fast to set up, suitable for most development tasks.
#
# full:    Extended environment with operator-replacement feature enabled.
#          Uses source-built DuckDB (duckdb-from-source) which provides internal APIs needed
#          for operator replacement. This environment takes longer to build initially
#          but subsequent builds are cached.
#          solve-group = "full" isolates this environment from 'default' to prevent conflicts
#          between conda-forge's libduckdb and duckdb-from-source.
#          no-default-feature = true prevents including default dependencies, ensuring only
#          duckdb-from-source is used (avoiding binary incompatibility issues).
[environments]
full = { features = ["operator-replacement"], solve-group = "full", no-default-feature = true }
