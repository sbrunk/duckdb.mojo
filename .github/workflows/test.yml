name: Run tests

on:
  push:
  workflow_dispatch:

jobs:
  check-generated-api:
    # Verify duckdb/_libduckdb.mojo was regenerated after any DuckDB version bump.
    # The bindings are platform-independent, so this only needs to run once.
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.69.0
          cache: true
          environments: default

      - name: Check generated bindings are up to date
        run: |
          source $HOME/.bash_profile
          pixi run check-generated-api

  build:
    strategy:
      matrix:
        # mojo_target_flags pins a conservative codegen target on linux-64 to
        # dodge a Mojo bug on GitHub's AMD EPYC 9V74 runners: host-CPU codegen
        # emits AVX-512 that Azure has masked off, causing SIGILL. Every CI
        # runner has AVX2, so x86-64-v3 is safe. Empty elsewhere (e.g. arm).
        include:
          - { target: linux-64, os: ubuntu-24.04, mojo_target_flags: "--target-cpu=x86-64-v3" }
          # TODO: re-enable once the aarch64 Int128 by-value ABI issue is fixed
          # (4 test_appender hugeint/uhugeint failures with garbage register/stack contents).
          # - { target: linux-aarch64, os: ubuntu-22.04-arm, mojo_target_flags: "" }
          - { target: osx-arm64, os: macos-15, mojo_target_flags: "" }
      fail-fast: false

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    # Consumed by scripts/run_tests.sh, the extension pixi tasks, and the
    # example step below. Only set here (CI), so local builds stay native.
    env:
      MOJO_TARGET_FLAGS: ${{ matrix.mojo_target_flags }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add swap space
        if: runner.os == 'Linux'
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.69.0
          cache: true
          environments: default

      - name: Cache Mojo compilation artifacts
        uses: actions/cache@v4
        with:
          path: .pixi/envs/default/share/max/cache
          # Bump the version suffix below to invalidate stale caches that
          # outlived a Mojo compiler upgrade (older caches can crash the
          # new compiler when restored).
          key: mojo-cache-v2-${{ matrix.target }}-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            mojo-cache-v2-${{ matrix.target }}-

      - name: Run test suite
        env:
          DUCKDB_MOJO_FULL_TESTS: "1"
        run: |
          source $HOME/.bash_profile
          pixi run test

      - name: Run example (smoke test, needs network)
        if: always()
        run: |
          source $HOME/.bash_profile
          # $MOJO_TARGET_FLAGS is set at the job level (CI only); empty off-CI.
          pixi run mojo run $MOJO_TARGET_FLAGS example.mojo

      - name: Compile-check benchmarks to guard against API/stdlib drift)
        if: always()
        run: |
          source $HOME/.bash_profile
          pixi run compile-benchmarks

  # Verify the rattler-build recipe still builds and its in-package smoke test
  # passes. Builds recipe.local.yaml (source = working tree) so it tests THIS
  # commit; recipe.yaml pins a fixed SHA and is only used for the actual
  # modular-community publish. Keep the mojo-compiler pin in the recipe in sync
  # with pixi.toml or this job will fail to resolve.
  conda-recipe:
    strategy:
      matrix:
        include:
          - { target: linux-64, os: ubuntu-24.04 }
          - { target: osx-arm64, os: macos-15 }
      fail-fast: false

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build and test conda recipe
        uses: prefix-dev/rattler-build-action@v0.2.38
        with:
          recipe-path: conda.recipe/recipe.local.yaml
          # Channels rattler-build resolves dependencies from (mojo-compiler +
          # libduckdb). Matches the local build command in the README.
          build-args: >-
            -c conda-forge
            -c https://conda.modular.com/max-nightly
            -c https://repo.prefix.dev/modular-community
          upload-artifact: false
