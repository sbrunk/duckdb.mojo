name: Run tests

on:
  push:
  workflow_dispatch:

jobs:
  check-generated-api:
    # Verify duckdb/_libduckdb.mojo was regenerated after any DuckDB version bump.
    # The bindings are platform-independent, so this only needs to run once.
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.63.2
          cache: true
          environments: default

      - name: Check generated bindings are up to date
        run: |
          source $HOME/.bash_profile
          pixi run check-generated-api

  build:
    strategy:
      matrix:
        include:
          - { target: linux-64, os: ubuntu-24.04 }
          # TODO: re-enable once the aarch64 Int128 by-value ABI issue is fixed
          # (4 test_appender hugeint/uhugeint failures with garbage register/stack contents).
          # - { target: linux-aarch64, os: ubuntu-22.04-arm }
          - { target: osx-arm64, os: macos-15 }
      fail-fast: false

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add swap space
        if: runner.os == 'Linux'
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.63.2
          cache: true
          environments: default

      - name: Cache Mojo compilation artifacts
        uses: actions/cache@v4
        with:
          path: .pixi/envs/default/share/max/cache
          # Bump the version suffix below to invalidate stale caches that
          # outlived a Mojo compiler upgrade (older caches can crash the
          # new compiler when restored).
          key: mojo-cache-v2-${{ matrix.target }}-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            mojo-cache-v2-${{ matrix.target }}-

      - name: Execute tests
        env:
          DUCKDB_MOJO_FULL_TESTS: "1"
        run: |
          source $HOME/.bash_profile
          pixi run mojo run example.mojo
          pixi run test
