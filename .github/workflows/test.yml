name: Run tests

on: ["push"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - { target: linux-64, os: ubuntu-22.04 }
          - { target: linux-aarch64, os: ubuntu-22.04 }
          - { target: osx-arm64, os: macos-15 }
      fail-fast: false

    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add swap space
        if: runner.os == 'Linux'
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 14

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.63.2
          cache: true
          environments: default

      - name: Cache Mojo compilation artifacts
        uses: actions/cache@v4
        with:
          path: .pixi/envs/default/share/max/cache
          key: mojo-cache-${{ matrix.target }}-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            mojo-cache-${{ matrix.target }}-

      - name: Execute tests
        run: |
          source $HOME/.bash_profile
          pixi build
          pixi run mojo run example.mojo
          pixi run test
