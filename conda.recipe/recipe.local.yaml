context:
  version: "0.1.0"

package:
  name: duckdb-mojo
  version: ${{ version }}

source:
  # Local build test only: build from the working tree instead of a pushed git
  # SHA. The committed recipe.yaml uses `git:` + a full SHA for reproducibility.
  - path: ..
    use_gitignore: true

build:
  number: 0
  script:
    - mojo precompile duckdb -o ${{ PREFIX }}/lib/mojo/duckdb.mojoc

requirements:
  build:
    - mojo-compiler =1.0.0b2.dev2026053106
  host:
    - mojo-compiler =1.0.0b2.dev2026053106
  run:
    # Exact pin, NOT pin_compatible: a precompiled .mojoc only loads under the
    # exact compiler it was built with. pin_compatible would allow a newer
    # nightly at install time, which fails with a version-mismatch error.
    - mojo-compiler ==1.0.0b2.dev2026053106
    - libduckdb >=1.5.3,<1.6

tests:
  - script:
      # On GitHub's linux-64 runners, host-CPU codegen can emit AVX-512 that the
      # runner masks off, causing SIGILL at runtime. Pin a safe baseline there
      # (every CI runner has AVX2). Mirrors MOJO_TARGET_FLAGS in test.yml — test
      # scripts can't read env vars, so the target is hard-coded via a selector.
      - if: linux and x86_64
        then:
          - mojo run --target-cpu=x86-64-v3 smoke_test.mojo
        else:
          - mojo run smoke_test.mojo
    files:
      recipe:
        - smoke_test.mojo
    requirements:
      run:
        - libduckdb >=1.5.3,<1.6

about:
  homepage: https://github.com/sbrunk/duckdb.mojo
  repository: https://github.com/sbrunk/duckdb.mojo
  license: MIT
  license_file: LICENSE
  summary: DuckDB bindings for Mojo.

extra:
  maintainers:
    - sbrunk
